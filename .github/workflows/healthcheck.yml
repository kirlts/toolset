name: Health Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - run: |
          FAILED=0
          for pair in \
            "/:Landing" \
            "/health:Health" \
            "/hindsight/health:HindsightAPI" \
            "/dashboard:Dashboard" \
            "/hindsight/mcp/:MCP" \
            ":8443/:Infisical" \
            ":8787/:HermesWebUI"; do
            path="${pair%%:*}"
            name="${pair##*:}"
            url="https://${{ secrets.FUNNEL_DOMAIN }}${path}"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ] || [ "$CODE" = "302" ] || [ "$CODE" = "404" ]; then
              echo "✅ ${name} (${path}) → ${CODE}"
            else
              echo "❌ ${name} (${path}) → ${CODE}"
              FAILED=$((FAILED + 1))
            fi
          done
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          [ "$FAILED" -eq 0 ] || exit 1
        id: check

      - name: Create issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.check.outputs.failed }}' || '1';
            const title = `⚠️ ${failed} URL(s) caídas`;
            const body = `**Qué pasó:** Health check detectó ${failed} URL(s) sin respuesta.
            **Cuándo:** ${new Date().toISOString()}
            **Pipeline:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

            Se recuperará automáticamente (caddy-selfheal o próximo deploy).`;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: ['health-check']
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['health-check']
              });
            }

      - name: Close issue on recovery
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: ['health-check']
            });
            for (const i of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: i.number,
                body: `✅ Recuperado ${new Date().toISOString()}`
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: i.number, state: 'closed'
              });
            }
