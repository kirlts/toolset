name: Deploy OpenTofu to OCI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  opentofu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar API Key de OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_API_KEY }}" > ~/.oci/gh_key.pem
          chmod 600 ~/.oci/gh_key.pem
          {
            echo "[DEFAULT]"
            echo "user=${{ secrets.OCI_USER_OCID }}"
            echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}"
            echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"
            echo "region=sa-valparaiso-1"
            echo "key_file=$HOME/.oci/gh_key.pem"
          } > ~/.oci/config

      - name: Instalar OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Inicializar OpenTofu
        working-directory: ./infrastructure
        run: tofu init

      - name: Tofu Plan (Solo PRs)
        if: github.event_name == 'pull_request'
        working-directory: ./infrastructure
        run: tofu plan

      - name: Tofu Apply (Solo Main)
        if: github.ref == 'refs/heads/main'
        working-directory: ./infrastructure
        run: tofu apply -auto-approve
