name: Deploy OpenTofu to OCI

on:
  push:
    branches:
      - main
  pull_request:

# Permisos estrictos requeridos para OIDC
permissions:
  id-token: write
  contents: read

jobs:
  opentofu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      # (Opcional por ahora) Inyección Dinámica de Secretos (Infisical)
      # - name: Inyectar Secretos de Infisical
      #   uses: Infisical/secrets-action@v1.0.7

      # Autenticación OIDC con Oracle Cloud via Identity Propagation Trust
      - name: Configurar OCI CLI con Identity Propagation Trust
        run: |
          python3 -m pip install --user oci-cli
          mkdir -p ~/.oci

          GITHUB_OIDC_TOKEN=$(curl -sL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=oci" | jq -r '.value')

          OCI_SESSION=$(curl -sL -X POST \
            -u "${{ secrets.OCI_OAUTH_CLIENT_ID }}:${{ secrets.OCI_OAUTH_CLIENT_SECRET }}" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            -d "assertion=$GITHUB_OIDC_TOKEN" \
            "${{ secrets.OCI_DOMAIN_URL }}/oauth2/v1/token")

          echo "OCI response: $OCI_SESSION"
          ACCESS_TOKEN=$(echo "$OCI_SESSION" | jq -r '.access_token')
          if [ "$ACCESS_TOKEN" = "null" ]; then
            echo "ERROR: Token exchange falló"
            echo "$OCI_SESSION"
            exit 1
          fi
          echo "Token exchange exitoso"
          echo "$ACCESS_TOKEN" > /tmp/oci_session_token

          {
            echo "[DEFAULT]"
            echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"
            echo "region=sa-valparaiso-1"
            echo "security_token_file=/tmp/oci_session_token"
          } > ~/.oci/config

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Instalar OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Inicializar OpenTofu
        working-directory: ./infrastructure
        run: tofu init

      - name: Tofu Plan (Solo PRs)
        if: github.event_name == 'pull_request'
        working-directory: ./infrastructure
        run: tofu plan

      - name: Tofu Apply (Solo Main)
        if: github.ref == 'refs/heads/main'
        working-directory: ./infrastructure
        run: tofu apply -auto-approve
