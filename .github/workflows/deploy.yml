name: Deploy OpenTofu + Services to OCI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      skip_opentofu:
        description: Skip OpenTofu provisioning
        type: boolean
        default: false
      skip_deploy:
        description: Skip service deployment
        type: boolean
        default: false
      skip_sandbox_build:
        description: Skip sandbox Docker image build
        type: boolean
        default: false
      skip_preflight:
        description: Skip post-deploy preflight checks
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  INFRA_DIR: ./infrastructure
  SSH_HOST: opc@toolset-oci-1-1
  REMOTE_DIR: /opt/toolset

jobs:
  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validation tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq yamllint jq 2>/dev/null

      - name: Validate deploy.sh syntax
        run: bash -n infrastructure/deploy.sh

      - name: Validate config.yaml
        run: python3 -c "import yaml; yaml.safe_load(open('infrastructure/hermes/config.yaml')); print('config.yaml OK')"

      - name: Validate kilo.jsonc
        run: python3 scripts/validate-kilo-config.py infrastructure/kilo.jsonc

  opentofu:
    name: OpenTofu Infrastructure
    needs: validate-configs
    if: ${{ !inputs.skip_opentofu }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar API Key de OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_API_KEY }}" > ~/.oci/gh_key.pem
          chmod 600 ~/.oci/gh_key.pem
          {
            echo "[DEFAULT]"
            echo "user=${{ secrets.OCI_USER_OCID }}"
            echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}"
            echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"
            echo "region=sa-valparaiso-1"
            echo "key_file=$HOME/.oci/gh_key.pem"
          } > ~/.oci/config

      - name: Instalar OCI CLI
        run: |
          python3 -m pip install --user oci-cli 2>/dev/null || true
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Descargar State Remoto (OCI Object Storage)
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          oci os object get \
            -bn toolset-opentofu-state \
            --name infrastructure/terraform.tfstate \
            --file terraform.tfstate 2>/dev/null || echo "No remote state yet (first run)"

      - name: Instalar OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Derivar SSH public key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          ssh-keygen -y -f /tmp/ssh_key > /tmp/ssh_key.pub
          echo "SSH_PUBLIC_KEY=$(cat /tmp/ssh_key.pub)" >> "$GITHUB_ENV"

      - name: Init OpenTofu
        working-directory: ${{ env.INFRA_DIR }}
        run: tofu init

      - name: Tofu Plan
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_infisical_encryption_key: ${{ secrets.INFISICAL_ENCRYPTION_KEY }}
          TF_VAR_infisical_auth_secret: ${{ secrets.INFISICAL_AUTH_SECRET }}
          TF_VAR_ssh_public_key: ${{ env.SSH_PUBLIC_KEY }}
        run: tofu plan

      - name: Tofu Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_infisical_encryption_key: ${{ secrets.INFISICAL_ENCRYPTION_KEY }}
          TF_VAR_infisical_auth_secret: ${{ secrets.INFISICAL_AUTH_SECRET }}
          TF_VAR_ssh_public_key: ${{ env.SSH_PUBLIC_KEY }}
        run: tofu apply -auto-approve

      - name: Subir State Remoto
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ env.INFRA_DIR }}
        run: |
          oci os object put \
            -bn toolset-opentofu-state \
            --name infrastructure/terraform.tfstate \
            --file terraform.tfstate \
            --force

  deploy-services:
    name: Deploy Services
    needs: validate-configs
    if: ${{ !inputs.skip_deploy && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailnet
        run: |
          sudo tailscale up \
            --auth-key=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=gh-deploy \
            --accept-routes

      - name: Disable Tailscale SSH interception
        run: sudo tailscale set --ssh=false

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Verify connectivity
        run: ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ env.SSH_HOST }} "hostname && uptime"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Hermes sandbox Docker image
        if: ${{ !inputs.skip_sandbox_build }}
        uses: docker/build-push-action@v6
        with:
          context: infrastructure/
          file: infrastructure/hermes-sandbox.Dockerfile
          tags: |
            toolset/hermes-sandbox:latest
            toolset/hermes-sandbox:${{ github.sha }}
          load: true
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox

      - name: Deploy services
        env:
          SSH_HOST: ${{ env.SSH_HOST }}
          INFISICAL_ENCRYPTION_KEY: ${{ secrets.INFISICAL_ENCRYPTION_KEY }}
          INFISICAL_AUTH_SECRET: ${{ secrets.INFISICAL_AUTH_SECRET }}
          INFISICAL_DB_PASSWORD: ${{ secrets.INFISICAL_DB_PASSWORD }}
          INFISICAL_SERVICE_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
          INFISICAL_ADMIN_EMAIL: ${{ secrets.INFISICAL_ADMIN_EMAIL }}
          INFISICAL_ADMIN_PASSWORD: ${{ secrets.INFISICAL_ADMIN_PASSWORD }}
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          HERMES_LLM_PROVIDER: ${{ secrets.HERMES_LLM_PROVIDER }}
          HERMES_LLM_MODEL: ${{ secrets.HERMES_LLM_MODEL }}
          HERMES_WEBUI_PASSWORD: ${{ secrets.HERMES_WEBUI_PASSWORD }}
          HERMES_WHATSAPP_MODE: ${{ secrets.HERMES_WHATSAPP_MODE }}
          WHATSAPP_ALLOWED_USERS: ${{ secrets.WHATSAPP_ALLOWED_USERS }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_MCP_KEY: ${{ secrets.COMPOSIO_MCP_KEY }}
          GH_CLI_TOKEN: ${{ secrets.GH_CLI_TOKEN }}
          FUNNEL_DOMAIN: ${{ vars.FUNNEL_DOMAIN }}
        working-directory: ${{ env.INFRA_DIR }}
        run: chmod +x deploy.sh && ./deploy.sh

      - name: Sync secrets to Infisical (standalone script, verifiable)
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
          INFISICAL_PID: ${{ secrets.INFISICAL_PID }}
          INFISICAL_URL: https://${{ vars.FUNNEL_DOMAIN }}:8443
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          FUNNEL_DOMAIN: ${{ vars.FUNNEL_DOMAIN }}
          HERMES_LLM_PROVIDER: ${{ secrets.HERMES_LLM_PROVIDER }}
          HERMES_LLM_MODEL: ${{ secrets.HERMES_LLM_MODEL }}
          HERMES_WEBUI_PASSWORD: ${{ secrets.HERMES_WEBUI_PASSWORD }}
          HERMES_WHATSAPP_MODE: ${{ secrets.HERMES_WHATSAPP_MODE }}
          WHATSAPP_ALLOWED_USERS: ${{ secrets.WHATSAPP_ALLOWED_USERS }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_MCP_KEY: ${{ secrets.COMPOSIO_MCP_KEY }}
        run: |
          python3 scripts/sync-infisical-secrets.py push
          python3 scripts/sync-infisical-secrets.py verify

      - name: Reverse sync (Infisical → GitHub Secrets)
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
          INFISICAL_PID: ${{ secrets.INFISICAL_PID }}
          INFISICAL_URL: https://${{ vars.FUNNEL_DOMAIN }}:8443
          GH_TOKEN: ${{ secrets.GH_CLI_TOKEN }}
        run: python3 scripts/sync-infisical-secrets.py pull

      - name: Post-deploy preflight checks
        if: ${{ !inputs.skip_preflight }}
        working-directory: ${{ env.INFRA_DIR }}
        run: chmod +x preflight.sh && ./preflight.sh
