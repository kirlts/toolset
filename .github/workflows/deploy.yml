name: Deploy OpenTofu + Services to OCI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'
      - '.env.example'
      - 'kairos-version.txt'
      - 'README-KAIROS.md'
  pull_request:
  workflow_dispatch:
    inputs:
      skip_opentofu:
        description: Skip OpenTofu provisioning
        type: boolean
        default: false
      skip_deploy:
        description: Skip service deployment
        type: boolean
        default: false
      skip_sandbox_build:
        description: Skip sandbox Docker image build
        type: boolean
        default: false
      skip_preflight:
        description: Skip post-deploy preflight checks
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  INFRA_DIR: ./infrastructure
  SSH_HOST: opc@toolset-oci-1-1
  REMOTE_DIR: /opt/toolset
  SSH_OPTS: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPath=~/.ssh/cm-%r@%h:%p -o ControlPersist=600

jobs:
  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq yamllint jq 2>/dev/null
      - run: bash -n infrastructure/deploy.sh
      - run: python3 -c "import yaml; yaml.safe_load(open('infrastructure/hermes/config.yaml')); print('OK')"
      - run: python3 scripts/validate-kilo-config.py infrastructure/kilo.jsonc

  opentofu:
    name: OpenTofu
    needs: validate-configs
    if: ${{ !inputs.skip_opentofu }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_API_KEY }}" > ~/.oci/gh_key.pem
          chmod 600 ~/.oci/gh_key.pem
          printf "[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=sa-valparaiso-1\nkey_file=%s\n" \
            "${{ secrets.OCI_USER_OCID }}" "${{ secrets.OCI_FINGERPRINT }}" \
            "${{ secrets.OCI_TENANCY_OCID }}" "$HOME/.oci/gh_key.pem" > ~/.oci/config
      - run: python3 -m pip install --user oci-cli 2>/dev/null || true
      - run: echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Download remote state
        working-directory: ${{ env.INFRA_DIR }}
        run: oci os object get -bn toolset-opentofu-state --name infrastructure/terraform.tfstate --file terraform.tfstate 2>/dev/null || true
      - uses: opentofu/setup-opentofu@v1
      - name: Derive SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/ssh_key && chmod 600 /tmp/ssh_key
          ssh-keygen -y -f /tmp/ssh_key > /tmp/ssh_key.pub
          echo "SSH_PUBLIC_KEY=$(cat /tmp/ssh_key.pub)" >> "$GITHUB_ENV"
      - name: Init
        working-directory: ${{ env.INFRA_DIR }}
        run: tofu init
      - name: Plan
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_infisical_encryption_key: ${{ secrets.INFISICAL_ENCRYPTION_KEY }}
          TF_VAR_infisical_auth_secret: ${{ secrets.INFISICAL_AUTH_SECRET }}
          TF_VAR_ssh_public_key: ${{ env.SSH_PUBLIC_KEY }}
        run: tofu plan
      - name: Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ env.INFRA_DIR }}
        env:
          TF_VAR_tailscale_auth_key: ${{ secrets.TAILSCALE_AUTH_KEY }}
          TF_VAR_infisical_encryption_key: ${{ secrets.INFISICAL_ENCRYPTION_KEY }}
          TF_VAR_infisical_auth_secret: ${{ secrets.INFISICAL_AUTH_SECRET }}
          TF_VAR_ssh_public_key: ${{ env.SSH_PUBLIC_KEY }}
        run: tofu apply -auto-approve
      - name: Upload state
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ env.INFRA_DIR }}
        run: oci os object put -bn toolset-opentofu-state --name infrastructure/terraform.tfstate --file terraform.tfstate --force

  deploy-services:
    name: Deploy
    needs: validate-configs
    if: ${{ !inputs.skip_deploy && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Detect what changed
      - name: Check changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "build_sandbox=false" >> $GITHUB_OUTPUT
          echo "pull_images=false" >> $GITHUB_OUTPUT
          if echo "$CHANGED" | tr ' ' '\n' | grep -q "hermes-sandbox.Dockerfile"; then
            echo "build_sandbox=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED" | tr ' ' '\n' | grep -q "docker-compose.yml"; then
            echo "pull_images=true" >> $GITHUB_OUTPUT
          fi
          echo "changed files: $(echo "$CHANGED" | tr '\n' ' ')"

      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          hostname: gh-deploy
      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
      - name: SSH connectivity + multiplex
        run: |
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_HOST }} "hostname && uptime"
          echo "SSH multiplex established"

      - name: Build sandbox Docker
        if: ${{ steps.changes.outputs.build_sandbox == 'true' && !inputs.skip_sandbox_build }}
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
      - name: Build sandbox image
        if: ${{ steps.changes.outputs.build_sandbox == 'true' && !inputs.skip_sandbox_build }}
        uses: docker/build-push-action@v6
        with:
          context: infrastructure/
          file: infrastructure/hermes-sandbox.Dockerfile
          tags: toolset/hermes-sandbox:latest
          load: true
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox

      - name: Deploy
        env:
          SSH_OPTS: ${{ env.SSH_OPTS }}
          SSH_HOST: ${{ env.SSH_HOST }}
          INFISICAL_ENCRYPTION_KEY: ${{ secrets.INFISICAL_ENCRYPTION_KEY }}
          INFISICAL_AUTH_SECRET: ${{ secrets.INFISICAL_AUTH_SECRET }}
          INFISICAL_DB_PASSWORD: ${{ secrets.INFISICAL_DB_PASSWORD }}
          INFISICAL_SERVICE_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
          INFISICAL_ADMIN_EMAIL: ${{ secrets.INFISICAL_ADMIN_EMAIL }}
          INFISICAL_ADMIN_PASSWORD: ${{ secrets.INFISICAL_ADMIN_PASSWORD }}
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          HERMES_LLM_PROVIDER: ${{ secrets.HERMES_LLM_PROVIDER }}
          HERMES_LLM_MODEL: ${{ secrets.HERMES_LLM_MODEL }}
          HERMES_WEBUI_PASSWORD: ${{ secrets.HERMES_WEBUI_PASSWORD }}
          HERMES_WHATSAPP_MODE: ${{ secrets.HERMES_WHATSAPP_MODE }}
          WHATSAPP_ALLOWED_USERS: ${{ secrets.WHATSAPP_ALLOWED_USERS }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_MCP_KEY: ${{ secrets.COMPOSIO_MCP_KEY }}
          GH_CLI_TOKEN: ${{ secrets.GH_CLI_TOKEN }}
          FUNNEL_DOMAIN: ${{ secrets.FUNNEL_DOMAIN }}
        working-directory: ${{ env.INFRA_DIR }}
        run: chmod +x deploy.sh && ./deploy.sh

      - name: Sync secrets
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
          INFISICAL_PID: ${{ secrets.INFISICAL_PID }}
          INFISICAL_URL: https://${{ secrets.FUNNEL_DOMAIN }}:8443
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          FUNNEL_DOMAIN: ${{ secrets.FUNNEL_DOMAIN }}
          HERMES_LLM_PROVIDER: ${{ secrets.HERMES_LLM_PROVIDER }}
          HERMES_LLM_MODEL: ${{ secrets.HERMES_LLM_MODEL }}
          HERMES_WEBUI_PASSWORD: ${{ secrets.HERMES_WEBUI_PASSWORD }}
          HERMES_WHATSAPP_MODE: ${{ secrets.HERMES_WHATSAPP_MODE }}
          WHATSAPP_ALLOWED_USERS: ${{ secrets.WHATSAPP_ALLOWED_USERS }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_MCP_KEY: ${{ secrets.COMPOSIO_MCP_KEY }}
        run: |
          python3 scripts/sync-infisical-secrets.py push
          python3 scripts/sync-infisical-secrets.py verify

      - name: Reverse sync
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_SERVICE_TOKEN }}
          INFISICAL_PID: ${{ secrets.INFISICAL_PID }}
          INFISICAL_URL: https://${{ secrets.FUNNEL_DOMAIN }}:8443
          GH_TOKEN: ${{ secrets.GH_CLI_TOKEN }}
        run: python3 scripts/sync-infisical-secrets.py pull

      - name: Notify failure
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ssh ${{ env.SSH_OPTS }} ${{ env.SSH_HOST }} \
            "hermes -z 'Notifica por WhatsApp: Pipeline falló en toolset. $RUN_URL'" 2>/dev/null || true

  preflight:
    name: Preflight Checks
    needs: deploy-services
    if: ${{ always() && github.ref == 'refs/heads/main' && needs.deploy-services.result == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          hostname: gh-deploy
      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
      - name: Run preflight
        working-directory: ${{ env.INFRA_DIR }}
        run: chmod +x preflight.sh && ./preflight.sh
